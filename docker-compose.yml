services:
  waiflo:
    build:
      context: .
      dockerfile: dockerfile
    working_dir: /app
    command: node server/index.js
    volumes:
      - waiflo-data:/data
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - JWT_SECRET=${JWT_SECRET}
      - MASTER_SECRET=${MASTER_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

volumes:
  waiflo-data:
    driver: local
